# Cloudflare Worker config for the YUGA AI assistant proxy.
#
# One-command deploy (after `wrangler login`):
#     wrangler secret put ANTHROPIC_API_KEY   # paste your key once
#     wrangler deploy
#
# Secrets are NEVER stored in this file — they are set with `wrangler secret put`
# and live encrypted on Cloudflare. See README.md for the full walkthrough.

name = "yuga-assistant"
main = "yuga-assistant-worker.js"
compatibility_date = "2025-09-01"

# Secrets to set once (interactive — never committed):
#   wrangler secret put ANTHROPIC_API_KEY     # required (or OPENAI_API_KEY — see README)
#   wrangler secret put TURNSTILE_SECRET      # optional — bot defense (README §Security)
