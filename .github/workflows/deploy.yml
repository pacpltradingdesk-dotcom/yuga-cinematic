name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

# Opt every JavaScript action into the Node.js 24 runtime ahead of GitHub's
# 2026-06-16 forced switch, so the deploy is validated under Node 24 now
# instead of breaking unattended on that date. Version-agnostic — no per-action
# tag bumps to guess. Remove once all actions ship Node 24 by default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build static export
        run: pnpm build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: "https://yuga-pmc.in"
          # Set this repo Variable to your deployed Worker URL to switch the
          # assistant from static search to live LLM chat. Unset → static mode.
          # (It's a public URL, so a Variable — not a Secret — is correct.)
          NEXT_PUBLIC_AI_ENDPOINT: ${{ vars.NEXT_PUBLIC_AI_ENDPOINT }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
